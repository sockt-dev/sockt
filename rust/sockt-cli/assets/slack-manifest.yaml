display_information:
  name: Sockt
  description: AI agent swarm powered by Sockt
  background_color: "#1a1a2e"
  long_description: |
    Sockt connects AI agent swarms to your Slack workspace via Socket Mode.
    Agents read messages, respond in threads, handle @mentions, and process
    interactive components like buttons and actions — all without exposing
    a public HTTP endpoint.

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Sockt
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - reactions:read
      - reactions:write
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
